# 拒绝直接 IP 访问和未知域名
server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;

    return 444;
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name <YOUR_DOMAIN> www.<YOUR_DOMAIN>;
    return 301 https://<YOUR_DOMAIN>$request_uri;
}

# www → 裸域跳转
server {
    listen 443 ssl http2;
    server_name www.<YOUR_DOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;

    return 301 https://<YOUR_DOMAIN>$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name <YOUR_DOMAIN>;

    # === CDN 回源真实 IP ===
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # === SSL 优化 ===
    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP Stapling - disabled (Let's Encrypt no longer provides OCSP responder URL)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 1.1.1.1 valid=300s;
    # resolver_timeout 5s;

    # === Gzip 压缩 ===
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # === 连接优化 ===
    client_max_body_size 10m;
    keepalive_timeout 300;
    keepalive_requests 1000;

    # === Proxy Buffer（防止 HTTP/2 协议错误）===
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # === 文件缓存（减少磁盘 IO） ===
    open_file_cache max=2000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # === 安全头 ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Served-By "origin" always;

    # === SEO 文件 ===
    location = /sitemap.xml {
        alias <PROJECT_DIR>/app/server/root-static/sitemap.xml;
    }
    location = /robots.txt {
        alias <PROJECT_DIR>/app/server/root-static/robots.txt;
    }

    # === 反代到 Express ===
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓存 Vite build 产物（带 hash 的文件名，可长缓存）
        location ~* /rocotools/assets/ {
            proxy_pass http://127.0.0.1:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # === PNG → WebP 自动转换 ===
    location ~* ^(/public/.+)\.png$ {
        root <PROJECT_DIR>/data;
        set $orig $1.png;
        set $webp $1.webp;

        add_header Vary Accept;
        expires 90d;
        add_header Cache-Control "public, immutable";

        set $cond "";
        if ($http_accept ~* "webp") {
            set $cond W;
        }
        if (-f <PROJECT_DIR>/data$webp) {
            set $cond "${cond}E";
        }
        if ($cond = WE) {
            rewrite ^(.*)\.png$ $1.webp last;
        }

        try_files $orig =404;
    }

    # === 静态资源（图片/WebP/icons） ===
    # ^~ ensures this takes priority over regex locations (e.g. \.(webp|png)$)
    location ^~ /public/ {
        alias <PROJECT_DIR>/data/public/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # 图片不需要 gzip
        gzip off;
        
        gzip_static on;
    }

    # === 上传图片缓存优化 ===
    # ^~ ensures this takes priority over regex locations
    location ^~ /uploads/ {
        alias <PROJECT_DIR>/data/uploads/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary Accept;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # 图片不需要 gzip
        gzip off;
        
        gzip_static on;
    }

    # === 图片格式通用缓存优化（仅匹配未被 ^~ 捕获的图片请求，如 /rocotools/assets/ 中的图片）===
    location ~* \.(webp|jpg|jpeg|png|gif|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary Accept;
        
        gzip_static on;
    }
}
