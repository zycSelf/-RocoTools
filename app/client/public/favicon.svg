<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="12" ry="12" fill="#1a1a2e"/>
  <!-- Compass outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#D69F23" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#D69F23" stroke-width="1" opacity="0.4"/>
  <!-- Cardinal direction ticks -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#D69F23" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="52" stroke="#D69F23" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#D69F23" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#D69F23" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Compass needle - North (gold triangle) -->
  <polygon points="32,15 28.5,32 35.5,32" fill="#D69F23"/>
  <!-- Compass needle - South (darker) -->
  <polygon points="32,49 28.5,32 35.5,32" fill="#8B6914" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#D69F23"/>
  <circle cx="32" cy="32" r="1.5" fill="#1a1a2e"/>
</svg>
